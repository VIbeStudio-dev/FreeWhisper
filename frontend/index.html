<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FreeWhisper</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="pill" class="pill idle">
      <select id="model-select" aria-label="Model speed">
        <option value="fast">Fast</option>
        <option value="fast2x">Ultra-fast</option>
      </select>

      <div class="drag-area" data-tauri-drag-region>
        <button id="wave-btn" type="button" aria-label="Toggle dictation">
          <svg id="mic-icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
            <rect x="9" y="2" width="6" height="13" rx="3" fill="currentColor" />
            <path d="M5 11v1a7 7 0 0 0 14 0v-1" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none" />
            <line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <line x1="8" y1="22" x2="16" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
          <div class="wave-container">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>
        </button>
        <span id="status" data-tauri-drag-region>Ready</span>
        <div class="spinner" data-tauri-drag-region></div>
      </div>

      <button id="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme">
        <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4" />
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
        </svg>
        <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" />
        </svg>
      </button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
